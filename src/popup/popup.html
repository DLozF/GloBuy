<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>GloBuy</title>
</head>
<body>
  <!-- Header: editorial wordmark, matching the landing page -->
  <header class="hdr">
    <img src="../../public/globuy-icon.svg" class="logo-img" alt="" />
    <div class="brand">
      <h1>GloBuy</h1>
    </div>
  </header>

  <div class="content">
    <!-- HERO: primary control -->
    <section class="card hero">
      <div class="card-row">
        <label for="enable" class="hero-label">Translate this site</label>
        <label class="switch lg">
          <input type="checkbox" id="enable" />
          <span class="slider"></span>
        </label>
      </div>
      <p class="host" id="host">—</p>
    </section>

    <!-- Targets: language + currency -->
    <section class="card">
      <div class="card-row select-row">
        <label for="lang" class="row-label">Translate into</label>
        <div class="select-wrap">
          <select id="lang"></select>
        </div>
      </div>
      <div class="card-row select-row">
        <label for="ccy" class="row-label">Convert prices to</label>
        <div class="select-wrap">
          <select id="ccy"></select>
        </div>
      </div>
    </section>

    <!-- Secondary refinements -->
    <p class="section-label">Options</p>
    <section class="card">
      <div class="opt">
        <div class="card-row">
          <label for="gloss" class="row-label">Luxury glossary</label>
          <label class="switch">
            <input type="checkbox" id="gloss" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="opt">
        <div class="card-row">
          <label for="size" class="row-label">Convert sizes to US</label>
          <label class="switch">
            <input type="checkbox" id="size" />
            <span class="slider"></span>
          </label>
        </div>
        <p class="hint" id="size-hint">US sizes are approximate (≈) and vary by brand and gender.</p>
      </div>
      <div class="opt">
        <div class="card-row">
          <label for="orig" class="row-label">Show original text</label>
          <label class="switch">
            <input type="checkbox" id="orig" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </section>

    <p class="status" id="status">Ready.</p>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
